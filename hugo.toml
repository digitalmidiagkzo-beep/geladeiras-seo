baseURL = "https://geladeirausada.com.br/"
languageCode = "pt-BR"
title = "Geladeira Usada BH - Entrega 24h em Belo Horizonte e Região"
theme = ""
enableRobotsTXT = true
enableEmoji = true
canonifyURLs = false

[params]
  siteName = "Geladeira Usada BH"
  siteDescription = "Geladeiras usadas seminovas com entrega em 24h em Belo Horizonte, Betim e Contagem. Garantia, qualidade e preço justo."
  whatsapp = "5531982162270"
  whatsappMessage = "Olá! Vi o anúncio no site e tenho interesse em comprar uma geladeira usada."
  phone = "(31) 9 8216-2270"
  email = "contato@geladeirausada.com.br"
  address = "Belo Horizonte, MG"
  businessName = "Geladeira Usada BH"
  cnpj = "00.000.000/0001-00"
  priceRangeSchema = "$$"
  defaultImage = "/images/geladeira-default.jpg"
  gaID = ""

[params.social]
  instagram = "https://instagram.com/geladeirausadabh"
  facebook  = "https://facebook.com/geladeirausadabh"

[outputs]
  home = ["HTML", "RSS", "sitemap"]
  page = ["HTML", "sitemap"]
  section = ["HTML", "RSS", "sitemap"]

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[taxonomies]
  
  modelo = "modelos"

[permalinks]
  geladeiras = "/geladeiras/:contentbasename/"

[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false

[server]
  [[server.headers]]
    for = "/**"
    [server.headers.values]
      X-Frame-Options = "DENY"
      X-Content-Type-Options = "nosniff"
      Referrer-Policy = "strict-origin-when-cross-origin"
