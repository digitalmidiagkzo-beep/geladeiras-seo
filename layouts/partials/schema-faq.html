<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {{ range $i, $faq := .Site.Data.faq }}{{ if $i }},{{ end }}
    {
      "@type": "Question",
      "name": "{{ $faq.pergunta }}",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "{{ $faq.resposta }}"
      }
    }
    {{ end }}
  ]
}
</script>
